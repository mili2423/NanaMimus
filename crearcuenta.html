     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<header class="barra-navegacion">
    <!-- NAVBAR SUPERIOR -->

      <img src="NanaMimus/logotipo.jpg" alt="Logo" class="logo">

<body>
      <div class="volver-atras-container">
    <button onclick="history.back()" class="volver-atras">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <main class="contenedor-centrado">
        <section class="info-texto">
            <!-- Título principal -->
            <h2 class="titulo">Crear Cuenta</h2>
            <p class="subtitulo">Hacé tus compras, comentá y más</p>
        </section>
        <div class="crearcuenta">
            <!-- Contenedor del formulario de registro -->
            <form action="registro.php" method="post">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>

                <label for="fecha">Fecha de nacimiento:</label>
                <input type="date" id="fecha" name="fecha" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="telefono">Teléfono:</label>
                <input type="number" id="telefono" name="telefono" required>

                <label for="password">Contraseña:</label>
                <input type="password"  name="clave" required id="claveRe">
             <button type="button" class="verr1" onclick="verClaveCon(event)" id="btnVerRe">
           <i class="fa-regular fa-eye-slash"></i>
             </button>
                

                <label for="confirm-password">Confirmar Contraseña:</label>
                <input type="password"name="confirmar_clave" required id="claveCo">
             <button type="button" class="verr2" onclick="verClaveCon(event)" id="btnVerCo">
           <i class="fa-regular fa-eye-slash"></i>
             </button>

                <button class="enviarr" type="submit">Crear Cuenta</button>
            </form>

            <!-- Sección para iniciar sesión si ya tiene una cuenta -->
            <div class="iniciar-sesion">
                <h4>¿Ya tienes una cuenta?</h4>
                    <a class="btnsesion" href="iniciosesion.html">Toque aquí</a>
            </div>
        </div>
    </main> 
    <script src="ocultar_Registro.js"></script>
</body>
</html>
